# Advanced CodeQL via this workflow only works if repo Settings → Code security → Code scanning
# has "Default setup" disabled (GitHub rejects SARIF otherwise).

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly baseline so long-lived branches stay covered even without PR activity.
    - cron: '37 6 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Until Node 24 is default on runners (matches github/codeql-action Node runtime).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: autobuild
          - language: java-kotlin
            build-mode: manual
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Setup Java (Gradle / Android)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Actions: extractor needs no build. JS/TS: CodeQL autobuild. Java: debug APK only (release signing needs secrets/keystore).
      - name: Build Java (assembleDebug)
        if: matrix.language == 'java-kotlin'
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Autobuild (JavaScript / TypeScript)
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
