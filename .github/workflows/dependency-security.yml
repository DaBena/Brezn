name: Dependency security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install (no lifecycle scripts)
        run: npm ci

      - name: Apply patches
        run: npm run apply-patches

      - name: Check lockfile install scripts
        run: npm run check:deps

      - name: npm audit
        run: npm audit --audit-level=moderate
